name: world_cup
description: App del Mundial 2026 con Clean Architecture + Riverpod
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Functional programming
  dartz: ^0.10.1

  # Equality
  equatable: ^2.0.5

  # Networking
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # Local storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Fonts
  google_fonts: ^6.2.1

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  country_flags: ^3.0.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Navigation
  go_router: ^13.2.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

  # Testing
  mockito: ^5.4.4

  # Linting
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
